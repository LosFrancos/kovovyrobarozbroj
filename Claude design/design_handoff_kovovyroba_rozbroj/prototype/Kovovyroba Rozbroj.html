<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kovovýroba Rozbroj — Prototyp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a1e1c;
    --navy2: #262b29;
    --mint: #c5e5d8;
    --mint2: #a8d4c1;
    --peach: #f2c9a0;
    --peach2: #e8b98c;
    --cream: #f5f2ed;
    --warm-gray: #e8e5df;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --white: #ffffff;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* Scroll-reveal */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: none; }

  .reveal { animation: fadeUp 0.7s ease-out both; }
  button { white-space: nowrap; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }

  ::-webkit-scrollbar-thumb { background: var(--peach); border-radius: 3px; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── TWEAKS ──────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "peachColor": "#f2c9a0",
  "mintColor": "#c5e5d8",
  "darkColor": "#1a1e1c",
  "fontHeading": "Barlow Condensed",
  "heroLayout": "split",
  "showAnimations": true
}/*EDITMODE-END*/;

/* ── PLACEHOLDERS ──────────────────────────────────────── */
const PhotoPlaceholder = ({ label, aspect = "4/3", style = {} }) => (
  <div style={{
    aspectRatio: aspect,
    background: '#efebe3',
    backgroundImage: 'repeating-linear-gradient(135deg, transparent 0px, transparent 24px, rgba(0,0,0,0.03) 24px, rgba(0,0,0,0.03) 25px)',
    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
    gap: 10, color: '#9a958b', position: 'relative',
    border: '1px solid rgba(0,0,0,0.06)',
    ...style
  }}>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
      <rect x="3" y="3" width="18" height="18"/><circle cx="8.5" cy="8.5" r="1.3"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <span style={{ fontFamily: "'Barlow', monospace", fontSize: 11, textAlign: 'center', padding: '0 16px', letterSpacing: '0.05em', textTransform: 'uppercase' }}>{label}</span>
    <div style={{ position: 'absolute', top: 10, left: 10, fontFamily: "'Barlow', monospace", fontSize: 10, color: 'rgba(0,0,0,0.3)', letterSpacing: '0.1em' }}>IMG</div>
  </div>
);

/* ── NAV ──────────────────────────────────────────────── */
const NAV_LINKS = [
  { id: 'uvod', label: 'Úvod' },
  { id: 'o-nas', label: 'O nás' },
  { id: 'sluzby', label: 'Služby' },
  { id: 'nase-prace', label: 'Naše práce' },
];
const NAV_LINKS_FOOTER = [
  ...NAV_LINKS,
  { id: 'kontakt', label: 'Kontakt' },
];

function Nav({ page, setPage, tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const navigate = (id) => {
    setPage(id);
    setMenuOpen(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const navBg = scrolled
    ? 'rgba(26,30,28,0.97)'
    : page === 'uvod' ? 'transparent' : 'rgba(26,30,28,1)';

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: navBg,
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      transition: 'background 0.3s ease',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.07)' : 'none',
    }}>
      <div style={{
        maxWidth: 1280, margin: '0 auto', padding: '0 32px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        height: 72,
      }}>
        {/* Logo */}
        <button onClick={() => navigate('uvod')} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <img src="images/logo.jpg" alt="Kovovýroba Rozbroj" style={{ height: 48, width: 'auto', display: 'block', borderRadius: 4 }} />
        </button>

        {/* Desktop links */}
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }} className="desktop-nav">
          {NAV_LINKS.map(l => (
            <button key={l.id} onClick={() => navigate(l.id)} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '8px 16px',
              fontFamily: 'Barlow, sans-serif', fontWeight: 500, fontSize: 14,
              color: page === l.id ? tweaks.peachColor : 'rgba(255,255,255,0.8)',
              letterSpacing: '0.04em',
              borderBottom: page === l.id ? `2px solid ${tweaks.peachColor}` : '2px solid transparent',
              transition: 'color 0.2s, border-color 0.2s',
              whiteSpace: 'nowrap',
            }}>
              {l.label}
            </button>
          ))}
          <button onClick={() => navigate('kontakt')} style={{
            marginLeft: 12,
            background: tweaks.peachColor, border: 'none', cursor: 'pointer',
            padding: '10px 22px',
            fontFamily: 'Barlow, sans-serif', fontWeight: 600, fontSize: 13,
            color: '#1a1e1c', letterSpacing: '0.05em',
            transition: 'background 0.2s',
          }}
          onMouseEnter={e => e.target.style.background = '#dfb280'}
          onMouseLeave={e => e.target.style.background = tweaks.peachColor}
          >
            Kontakt →
          </button>
        </div>

        {/* Hamburger */}
        <button onClick={() => setMenuOpen(!menuOpen)} style={{
          display: 'none', background: 'none', border: 'none', cursor: 'pointer',
          flexDirection: 'column', gap: 5, padding: 4,
        }} className="hamburger">
          {[0,1,2].map(i => (
            <div key={i} style={{ width: 24, height: 2, background: '#fff', transition: '0.2s' }} />
          ))}
        </button>
      </div>

      {/* Mobile menu */}
      {menuOpen && (
        <div style={{
          background: 'rgba(26,30,28,0.98)', padding: '16px 32px 24px',
          borderTop: '1px solid rgba(255,255,255,0.1)',
        }}>
          {NAV_LINKS_FOOTER.map(l => (
            <button key={l.id} onClick={() => navigate(l.id)} style={{
              display: 'block', width: '100%', textAlign: 'left',
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '14px 0',
              fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 600, fontSize: 20,
              color: page === l.id ? tweaks.peachColor : '#fff',
              letterSpacing: '0.05em',
              borderBottom: '1px solid rgba(255,255,255,0.07)',
            }}>{l.label}</button>
          ))}
        </div>
      )}
    </nav>
  );
}


/* ── HERO SLIDESHOW ───────────────────────────────────── */
const HERO_SLIDES = [
  { url: 'https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=1920&q=80', label: 'Svařování — detail řemesla' },
  { url: 'https://images.unsplash.com/photo-1565043589221-1a6fd9ae45c7?w=1920&q=80', label: 'Jiskry při broušení' },
  { url: 'https://images.unsplash.com/photo-1530124566582-a618bc2615dc?w=1920&q=80', label: 'Kovová dílna' },
  { url: 'https://images.unsplash.com/photo-1533069027836-fa937181a8ce?w=1920&q=80', label: 'Moderní schodiště' },
];

function HeroSlideshow({ darkColor }) {
  const [active, setActive] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setActive(a => (a + 1) % HERO_SLIDES.length), 5000);
    return () => clearInterval(id);
  }, []);

  return (
    <>
      {HERO_SLIDES.map((slide, i) => (
        <div key={i} style={{
          position: 'absolute', inset: 0,
          backgroundImage: `url("${slide.url}")`,
          backgroundSize: 'cover',
          backgroundPosition: 'center',
          opacity: i === active ? 0.85 : 0,
          transform: i === active ? 'scale(1.06)' : 'scale(1.0)',
          transition: 'opacity 1.4s ease-in-out, transform 6s ease-out',
        }} />
      ))}
      {/* Overlay gradient pro čitelnost */}
      <div style={{
        position: 'absolute', inset: 0,
        background: `linear-gradient(90deg, rgba(26,30,28,0.85) 0%, rgba(26,30,28,0.55) 50%, rgba(26,30,28,0.35) 100%)`,
      }} />
      {/* Progress indikátor */}
      <div style={{
        position: 'absolute', bottom: 28, right: 32, zIndex: 2,
        display: 'flex', gap: 8,
      }}>
        {HERO_SLIDES.map((_, i) => (
          <button key={i} onClick={() => setActive(i)} style={{
            width: i === active ? 32 : 16, height: 2,
            background: i === active ? '#f2c9a0' : 'rgba(255,255,255,0.3)',
            border: 'none', padding: 0, cursor: 'pointer',
            transition: 'width 0.4s, background 0.4s',
          }} />
        ))}
      </div>
    </>
  );
}

        alignItems: 'center',

          position: 'absolute', left: 0, top: 0, bottom: 0,

        <div style={{
          position: 'relative', zIndex: 1,
          maxWidth: 1280, margin: '0 auto', padding: '120px 32px 80px',
          width: '100%',
        }}>
          <div style={{
            display: 'inline-block',
            background: tweaks.peachColor,
            color: '#1a1e1c',
            fontFamily: 'Barlow Condensed, sans-serif',
            fontWeight: 600, fontSize: 12, letterSpacing: '0.2em',
            padding: '6px 14px', marginBottom: 28,
            textTransform: 'uppercase',
            whiteSpace: 'nowrap',
          }}>
            Karviná · Rodinná kovovýroba
          </div>

          <h1 style={{
            fontFamily: 'Barlow Condensed, sans-serif',
            fontWeight: 800,
            fontSize: 'clamp(52px, 8vw, 110px)',
            color: '#fff',
            lineHeight: 0.92,
            letterSpacing: '-0.01em',
            maxWidth: 800,
            marginBottom: 32,
            textWrap: 'balance',
          }}>
            KOVOVÝROBA<br />
            <span style={{ color: tweaks.peachColor }}>NA MÍRU.</span>
          </h1>

          <p style={{
            fontFamily: 'Barlow, sans-serif',
            fontWeight: 300, fontSize: 18,
            color: 'rgba(255,255,255,0.75)',

            marginBottom: 48,
          }}>

          </p>

          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'center' }}>
            <button onClick={() => { setPage('kontakt'); window.scrollTo({top:0}); }} style={{
              background: tweaks.peachColor, border: 'none', cursor: 'pointer',
              padding: '16px 36px',
              fontFamily: 'Barlow, sans-serif', fontWeight: 600, fontSize: 15,

              transition: 'transform 0.15s, background 0.15s',
              whiteSpace: 'nowrap',
            }}
            onMouseEnter={e => { e.target.style.background='#dfb280'; e.target.style.transform='translateY(-2px)'; }}
            onMouseLeave={e => { e.target.style.background=tweaks.peachColor; e.target.style.transform='none'; }}
            >
              Nezávazná poptávka →
            </button>
            <button onClick={() => { setPage('nase-prace'); window.scrollTo({top:0}); }} style={{

              color: 'rgba(255,255,255,0.85)', letterSpacing: '0.05em',

            display: 'flex', gap: 48, marginTop: 80,
            paddingTop: 48, borderTop: '1px solid rgba(255,255,255,0.12)',
            flexWrap: 'wrap',
          }}>
            {[
              { num: '15+', label: 'let zkušeností' },

              { num: 'A–Z', label: 'návrh · výroba · montáž' },
            ].map(s => (
              <div key={s.num}>
                <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 800, fontSize: 42, color: tweaks.peachColor, lineHeight: 1 }}>{s.num}</div>

                {c.lines.map((l, j) => <div key={j} style={{ fontSize: 15, color: '#555', marginBottom: 2 }}>{l}</div>)}
                <a href={c.action} style={{ display: 'inline-block', marginTop: 10, fontSize: 13, color: tweaks.peachColor, fontWeight: 600, textDecoration: 'none', letterSpacing: '0.04em' }}>{c.actionLabel} →</a>
              </div>
            ))}


          </div>
        </div>

        {/* Form */}
        <div>
          <h2 style={{ fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 800, fontSize: 32, color: tweaks.darkColor, marginBottom: 8 }}>NEZÁVAZNÁ POPTÁVKA</h2>
          <p style={{ color: '#888', fontSize: 14, marginBottom: 36 }}>Odpovíme do 24 hodin.</p>

          {sent ? (
            <div style={{ padding: '40px', background: tweaks.darkColor, textAlign: 'center' }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>✓</div>
              <h3 style={{ fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 700, fontSize: 24, color: '#fff', marginBottom: 8 }}>Zpráva odeslána!</h3>
              <p style={{ color: 'rgba(255,255,255,0.65)', fontSize: 15 }}>Ozveme se vám co nejdříve.</p>
            </div>
          ) : (
            <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {[
                { key: 'jmeno', label: 'Jméno a příjmení *', type: 'text', required: true },
                { key: 'email', label: 'E-mail *', type: 'email', required: true },
                { key: 'telefon', label: 'Telefon', type: 'tel', required: false },
              ].map(f => (
                <div key={f.key}>
                  <label style={{ display: 'block', fontFamily: 'Barlow, sans-serif', fontWeight: 500, fontSize: 12, letterSpacing: '0.08em', color: '#666', marginBottom: 6 }}>{f.label.toUpperCase()}</label>
                  <input
                    type={f.type}
                    required={f.required}
                    value={form[f.key]}
                    onChange={e => setForm({ ...form, [f.key]: e.target.value })}
                    style={{
                      width: '100%', padding: '12px 16px',
                      border: '1px solid #d0cdc8', background: '#fff',
                      fontFamily: 'Barlow, sans-serif', fontSize: 15, color: '#333',
                      outline: 'none',
                    }}
                  />
                </div>
              ))}
              <div>
                <label style={{ display: 'block', fontFamily: 'Barlow, sans-serif', fontWeight: 500, fontSize: 12, letterSpacing: '0.08em', color: '#666', marginBottom: 6 }}>POPIS POPTÁVKY *</label>
                <textarea
                  required
                  rows={5}
                  value={form.zprava}
                  onChange={e => setForm({ ...form, zprava: e.target.value })}
                  placeholder="Co chcete vyrobit? Popište projekt, rozměry, materiál..."
                  style={{
                    width: '100%', padding: '12px 16px',
                    border: '1px solid #d0cdc8', background: '#fff',
                    fontFamily: 'Barlow, sans-serif', fontSize: 15, color: '#333',
                    resize: 'vertical', outline: 'none',
                  }}
                />
              </div>
              <button type="submit" style={{
                background: tweaks.peachColor, border: 'none', cursor: 'pointer',
                padding: '16px 32px', alignSelf: 'flex-start',
                fontFamily: 'Barlow, sans-serif', fontWeight: 700, fontSize: 15,
                color: '#1a1e1c', letterSpacing: '0.05em',
                transition: 'transform 0.15s, background 0.15s',
              }}
              onMouseEnter={e => { e.target.style.background='#dfb280'; e.target.style.transform='translateY(-2px)'; }}
              onMouseLeave={e => { e.target.style.background=tweaks.peachColor; e.target.style.transform='none'; }}
              >
                Odeslat poptávku →
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── TWEAKS PANEL ───────────────────────────────────────── */
function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const update = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 1000,
      background: '#fff', boxShadow: '0 8px 40px rgba(0,0,0,0.15)',
      padding: '20px 24px', width: 260, fontFamily: 'Barlow, sans-serif',
    }}>
      <div style={{ fontWeight: 700, fontSize: 13, letterSpacing: '0.08em', marginBottom: 16, color: '#111' }}>TWEAKS</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <label style={{ fontSize: 12, color: '#666' }}>
          Béžová (Rozbroj)
          <input type="color" value={tweaks.peachColor} onChange={e => update('peachColor', e.target.value)}
            style={{ display: 'block', marginTop: 6, width: '100%', height: 32, border: 'none', cursor: 'pointer' }} />
        </label>
        <label style={{ fontSize: 12, color: '#666' }}>
          Tmavá barva
          <input type="color" value={tweaks.darkColor} onChange={e => update('darkColor', e.target.value)}
            style={{ display: 'block', marginTop: 6, width: '100%', height: 32, border: 'none', cursor: 'pointer' }} />
        </label>
        <label style={{ fontSize: 12, color: '#666' }}>
          Mint (Kovovýroba)
          <input type="color" value={tweaks.mintColor} onChange={e => update('mintColor', e.target.value)}
            style={{ display: 'block', marginTop: 6, width: '100%', height: 32, border: 'none', cursor: 'pointer' }} />
        </label>
        <label style={{ fontSize: 12, color: '#666', display: 'flex', alignItems: 'center', gap: 8 }}>
          <input type="checkbox" checked={tweaks.showAnimations} onChange={e => update('showAnimations', e.target.checked)} />
          Animace při přechodu
        </label>
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────── */
function App() {
  const saved = localStorage.getItem('kv-page');
  const [page, setPage] = useState(saved || 'uvod');
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => { localStorage.setItem('kv-page', page); }, [page]);

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const pages = { uvod: HomePage, 'o-nas': ONasPage, sluzby: SluzbyPage, 'nase-prace': NasePracePage, kontakt: KontaktPage };
  const PageComponent = pages[page] || HomePage;

  return (
    <>
      <style>{`
        @media (max-width: 768px) {
          .desktop-nav { display: none !important; }
          .hamburger { display: flex !important; }
        }
        @media (max-width: 860px) {
          section > div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
          div[style*="grid-template-columns: 2fr 1fr 1fr"] { grid-template-columns: 1fr !important; }
          div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
        }
      `}</style>
      <Nav page={page} setPage={setPage} tweaks={tweaks} />
      <main key={page} style={{ minHeight: '100vh', animation: 'fadeUp 0.45s ease-out both' }}>
        <PageComponent setPage={setPage} tweaks={tweaks} />
      </main>
      <Footer setPage={setPage} tweaks={tweaks} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
